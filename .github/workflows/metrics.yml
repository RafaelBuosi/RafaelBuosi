name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Atualiza o perfil todo dia à meia-noite
  workflow_dispatch:              # Permite que você rode manualmente para testar
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      # Job 1: Gera o Calendário Isométrico (3D)
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.fullyear.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Job 2: Gera o mural de tecnologias (Hover/Icons)
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.topics.svg
          token: NOT_NEEDED
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
